# CloudNativePG Cluster — pulse database
# Managed by the cnpg operator (installed by Flux in cnpg-system).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pulse-db
  namespace: pulse
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: pulse
      owner: pulse
      secret:
        name: pulse-db-credentials
---
# pulse-db-credentials must be created manually ONCE before first deploy.
# The password is never stored in git.
#
# Run this once after the namespace exists:
#
#   kubectl create secret generic pulse-db-credentials \
#     -n pulse \
#     --from-literal=username=pulse \
#     --from-literal=password=$(openssl rand -base64 24)
#
# CloudNativePG will create a second secret 'pulse-db-app' with a full
# connection URI — this is what the backend Deployment reads via:
#   DATABASE_URL = pulse-db-app[uri]
#
# To rotate the password:
#   kubectl delete secret pulse-db-credentials -n pulse
#   kubectl create secret generic pulse-db-credentials -n pulse \
#     --from-literal=username=pulse --from-literal=password=<new>
#   kubectl rollout restart deployment/pulse-backend -n pulse
apiVersion: v1
kind: Secret
metadata:
  name: pulse-db-credentials-placeholder
  namespace: pulse
  annotations:
    # This placeholder is intentionally empty.
    # Create the real secret manually — see comment above.
    pulse/secret-instructions: "create pulse-db-credentials manually"
stringData: {}
