# Three CloudNativePG databases — one per microservice.
# Each creates a secret named <cluster-name>-app with the connection URI.
#
# Before first deploy, create each credentials secret manually once:
#
#   kubectl create secret generic auth-db-credentials -n pulse \
#     --from-literal=username=auth --from-literal=password=$(openssl rand -base64 24)
#
#   kubectl create secret generic longterm-db-credentials -n pulse \
#     --from-literal=username=longterm --from-literal=password=$(openssl rand -base64 24)
#
#   kubectl create secret generic daily-db-credentials -n pulse \
#     --from-literal=username=daily --from-literal=password=$(openssl rand -base64 24)
#
# Also create the shared JWT secret once:
#
#   kubectl create secret generic pulse-jwt-secret -n pulse \
#     --from-literal=secret=$(openssl rand -base64 48)
#
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: pulse
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: auth
      owner: auth
      secret:
        name: auth-db-credentials
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: longterm-db
  namespace: pulse
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: longterm
      owner: longterm
      secret:
        name: longterm-db-credentials
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: daily-db
  namespace: pulse
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: daily
      owner: daily
      secret:
        name: daily-db-credentials
