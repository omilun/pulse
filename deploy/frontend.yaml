apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-frontend
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulse-frontend
  template:
    metadata:
      labels:
        app: pulse-frontend
    spec:
      imagePullSecrets:
        - name: harbor-registry-secret
      containers:
        - name: frontend
          image: registry.talos-tart-ha.talos-on-macos.com/pulse/frontend:latest  # built by Argo Workflows + Kaniko, pushed to Zot registry
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://pulse-backend:8080"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-frontend
  namespace: pulse
spec:
  selector:
    app: pulse-frontend
  ports:
    - port: 3000
