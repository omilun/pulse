# HTTPRoutes — attach to the shared Cilium Gateway in the infra repo
# All routes use the same hostname; path-based routing dispatches to each service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-auth
  namespace: pulse
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
  hostnames:
    - "pulse.talos-tart-ha.talos-on-macos.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth/
      backendRefs:
        - name: pulse-auth
          port: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-longterm
  namespace: pulse
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
  hostnames:
    - "pulse.talos-tart-ha.talos-on-macos.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/lt/
      backendRefs:
        - name: pulse-longterm
          port: 8082
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-daily
  namespace: pulse
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
  hostnames:
    - "pulse.talos-tart-ha.talos-on-macos.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/daily/
      backendRefs:
        - name: pulse-daily
          port: 8083
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-frontend
  namespace: pulse
spec:
  parentRefs:
    - name: main-gateway
      namespace: networking
  hostnames:
    - "pulse.talos-tart-ha.talos-on-macos.com"
  rules:
    - backendRefs:
        - name: pulse-frontend
          port: 3000
